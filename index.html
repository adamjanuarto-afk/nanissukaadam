<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Danissa Syahira Utomo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <main class="container">
        <h1 class="typed-name"></h1>
        
        <section class="note-section">
            <img src="danissa_profil.jpg" class="profile-photo" alt="Danissa">
            <h3>Danissa's World</h3>
            <p>Bintang di langit tak terhitung, tapi bagiku, hanya satu yang benar-benar bersinar: dirimu, Danissa. Kamu adalah melodi terindah di duniaku.</p>
        </section>

        <section class="testi-section">
            <h3>TESTIMONIALS</h3>
            <div class="testi-card">
                <img src="foto_testi.jpg" class="testi-photo" alt="Testimoni">
                <p>❤️ Danissa adalah keajaiban kecil di hidupku. Keceriaannya menular dan ketulusannya adalah inspirasi.</p>
            </div>
        </section>

        <section class="gallery-section">
            <h3>MY PICTURES</h3>
            <div class="gallery-carousel">
                <img src="galeri1.jpg" alt="Foto 1">
                <img src="galeri2.jpg" alt="Foto 2">
                <img src="galeri3.jpg" alt="Foto 3">
                <img src="galeri4.jpg" alt="Foto 4">
                <img src="galeri5.jpg" alt="Foto 5">
            </div>
        </section>

        <button id="surprise-btn" onclick="playMusic()">Klik untuk Kejutan</button>
        <audio id="myAudio" src="lagu.mp3" loop></audio>
    </main>
    <script src="script.js"></script>
</body>
</html>
